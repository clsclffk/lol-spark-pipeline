# docker-compose.yml
#
# 로컬 Spark 클러스터 구성
# master 1대 + worker 2대
#
# 실행: docker compose up -d
# 중지: docker compose down
#
# Spark UI
#   http://localhost:8080  master 상태 확인
#   http://localhost:4040  job 실행 중 확인 (앱 실행 시 활성화)

services:

  spark-master:
    image: apache/spark:3.5.1-python3
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./data:/opt/spark/data
      # 로컬 data/ 마운트
      # worker가 여러 컨테이너라 실제로는 파일 공유 불가 -> GCS 전환 이유
    networks:
      - spark-network

  spark-worker-1:
    image: apache/spark:3.5.1-python3
    container_name: spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=4g   # OOM 실험 시 이 값 조정 (낮추면 OOM 유발)
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_WEBUI_PORT=8081
    ports:
      - "8081:8081"
    volumes:
      - ./data:/opt/spark/data
    depends_on:
      - spark-master
    networks:
      - spark-network

  spark-worker-2:
    image: apache/spark:3.5.1-python3
    container_name: spark-worker-2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=4g
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_WEBUI_PORT=8081
    ports:
      - "8082:8081"   # 포트 충돌 방지
    volumes:
      - ./data:/opt/spark/data
    depends_on:
      - spark-master
    networks:
      - spark-network

networks:
  spark-network:
    driver: bridge